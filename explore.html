   PROBLEM SYSTEM

<script>

const problems = [

{
id:1,
title:"Electrodynamic Interaction with Tuned Inductive Conductors",
field:"Electrodynamics · Plasma Physics · Nonlinear Systems",
tags:["MHD","Inductive circuits","Radiation pressure","Particle dynamics"],

content: `

<p>
At an experiment conducted at the facility  
<b>EDRS-IC (ElectroDynamics Research Sweden–India Coalition)</b>:
</p>

<p>
A deuteron moves with constant velocity
$$
v = 7.2 \\times 10^{6} \\, km/h
$$
through four conductors separated by distance \(d\).
</p>

<p>
Each conductor is placed at
$$
d = 10a
$$
</p>

<p>
Given inductances:
$$
L_A = 0.44H,\\;
L_B = 0.88H,\\;
L_C = 0.176H,\\;
L_D = 0.36H
$$
</p>

<p>
The circuits are tuned such that magnetic energy is equal at crossing.
</p>

<p>
The particle reflects from a mirror.  
Determine the effective area \(A\).
</p>

<div style="text-align:center;margin-top:20px;">

<a href="edrs_setup.png" target="_blank">
<img src="edrs_setup.png"
style="max-width:500px;width:100%;border-radius:10px;opacity:0.9;">
</a>

<p style="font-size:12px;opacity:0.6;">
Experimental configuration of the inductive conductor system.
</p>

</div>

`
},

{
id:2,
title:"Algebraic Characterization of Limit Cycles",
field:"Dynamical Systems",
tags:["Limit cycles","Geometry"],
content:`
<p>
$$P(R^2)=0,\\quad Q(R)=0$$
</p>
<p>
Can limit cycles emerge as solutions?
</p>
`
}

];

let currentProblem = problems[problems.length-1];

function renderProblem(p){

document.getElementById("problem-container").innerHTML = `
<div class="lab-header">
<div class="lab-title">Open Problem #${p.id} — ${p.title}</div>
<div class="lab-meta">${p.field}</div>
<div class="lab-tags">
${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>

<div class="panel">${p.content}</div>
`;

MathJax.typeset();
}

function renderArchive(){

document.getElementById("archive-list").innerHTML =
problems.slice().reverse().map(p=>`
<div class="archive-item" onclick="loadProblem(${p.id})">
Problem #${p.id} — ${p.title}
</div>
`).join("");

}

function loadProblem(id){
let p = problems.find(x=>x.id===id);
renderProblem(p);
window.scrollTo({top:0,behavior:"smooth"});
}

renderProblem(currentProblem);
renderArchive();

</script>

<!-- ============================
   GRAPH
============================ -->

<script>

function plotFunction(){

let expr = document.getElementById("func").value
.replaceAll("^","**")
.replaceAll("sin","Math.sin")
.replaceAll("cos","Math.cos")
.replaceAll("exp","Math.exp")

let canvas = document.getElementById("graph")
let ctx = canvas.getContext("2d")

canvas.width = canvas.clientWidth
canvas.height = canvas.clientHeight

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.beginPath()

for(let px=0;px<canvas.width;px++){

let x = (px/canvas.width)*20-10
let y = eval(expr.replace(/x/g,x))

let py = canvas.height/2 - y*20

if(px===0) ctx.moveTo(px,py)
else ctx.lineTo(px,py)
}

ctx.strokeStyle="#ffd8a6"
ctx.stroke()

}

</script>

<!-- ============================
   3D SANDBOX
============================ -->

<script>

const container = document.getElementById("sandbox3d");

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,1,0.1,1000);
camera.position.set(0,30,100);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(container.clientWidth,container.clientHeight);
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);

let particles = [];
let fieldStrength = 1;

document.getElementById("strength").oninput = e=>{
fieldStrength = e.target.value;
};

function spawn(){

let geo = new THREE.SphereGeometry(0.5);
let mat = new THREE.MeshBasicMaterial({color:0xffcc66});
let p = new THREE.Mesh(geo,mat);

p.velocity = new THREE.Vector3(
Math.random()-0.5,
Math.random()-0.5,
Math.random()-0.5
);

scene.add(p);
particles.push(p);
}

function animate(){

particles.forEach(p=>{

let fx = eval(document.getElementById("fx").value || "-y")
let fy = eval(document.getElementById("fy").value || "x")
let fz = eval(document.getElementById("fz").value || "0")

p.velocity.add(new THREE.Vector3(fx,fy,fz).multiplyScalar(0.01*fieldStrength))
p.position.add(p.velocity)

});

renderer.render(scene,camera);
requestAnimationFrame(animate);
}

setInterval(spawn,1000);
animate();

</script>

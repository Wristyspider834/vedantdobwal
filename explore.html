<script>

const problems = [

{
id:1,
title:"Electrodynamic Interaction with Tuned Inductive Conductors",
field:"Electrodynamics · Plasma Physics · Nonlinear Systems",
tags:["MHD","Inductive circuits","Radiation pressure","Particle dynamics"],

content: `

<p>
At an experiment conducted at the facility  
<b>EDRS-IC (ElectroDynamics Research Sweden–India Coalition)</b>:
</p>

<p>
A deuteron moves with constant velocity
$$
v = 7.2 \\times 10^{6} \\, km/h
$$
through four conductors separated by distance \(d\).
</p>

<p>
Each conductor is placed at
$$
d = 10a
$$
</p>

<p>
Given inductances:
$$
L_A = 0.44H,\\;
L_B = 0.88H,\\;
L_C = 0.176H,\\;
L_D = 0.36H
$$
</p>

<p>
The circuits are tuned such that magnetic energy is equal at crossing.
</p>

<p>
The particle reflects from a mirror.  
Determine the effective area \(A\).
</p>

<div style="text-align:center;margin-top:20px;">

<a href="edrs_setup.png" target="_blank">
<img src="edrs_setup.png"
style="max-width:500px;width:100%;border-radius:10px;opacity:0.9;">
</a>

<p style="font-size:12px;opacity:0.6;">
Experimental configuration of the inductive conductor system.
</p>

</div>

`
},

{
id:2,
title:"Algebraic Characterization of Limit Cycles",
field:"Dynamical Systems",
tags:["Limit cycles","Geometry"],
content: `

<p>
Consider a planar polynomial vector field:
$$
\\dot{x} = P(x,y), \\quad \\dot{y} = Q(x,y)
$$
where \(P, Q\) are polynomials.
</p>

<p>
Suppose there exists a class of probing curves parameterized by a scalar quantity \(R\), such that limit cycles correspond to solutions of:
$$
P(R^2) = 0, \\quad Q(R) = 0
$$
</p>

<p>
Here, \(R\) is not necessarily radial in the Euclidean sense, but may represent a geometric or functional measure associated with closed trajectories.
</p>

<p>
<strong>Exploratory Questions:</strong>
</p>

<ul>
<li>Can limit cycles be characterized as simultaneous solutions of such algebraic constraints?</li>
<li>What class of probing curves makes this formulation meaningful?</li>
<li>Does the structure encode multiplicity or stability information?</li>
<li>Can this reduce detection of limit cycles to algebraic conditions?</li>
</ul>

<p style="opacity:0.6;font-size:13px;">
Not a claim. Not a theorem. A direction.
</p>

`

];

let currentProblem = problems[problems.length-1];

function renderProblem(p){

document.getElementById("problem-container").innerHTML = `
<div class="lab-header">
<div class="lab-title">Open Problem #${p.id} — ${p.title}</div>
<div class="lab-meta">${p.field}</div>
<div class="lab-tags">
${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>

<div class="panel">${p.content}</div>
`;

MathJax.typeset();
}

function renderArchive(){

document.getElementById("archive-list").innerHTML =
problems.slice().reverse().map(p=>`
<div class="archive-item" onclick="loadProblem(${p.id})">
Problem #${p.id} — ${p.title}
</div>
`).join("");

}

function loadProblem(id){
let p = problems.find(x=>x.id===id);
renderProblem(p);
window.scrollTo({top:0,behavior:"smooth"});
}

renderProblem(currentProblem);
renderArchive();

</script>

<script>

function plotFunction(){

let expr = document.getElementById("func").value
.replaceAll("^","**")
.replaceAll("sin","Math.sin")
.replaceAll("cos","Math.cos")
.replaceAll("exp","Math.exp");

let canvas = document.getElementById("graph");
let ctx = canvas.getContext("2d");

canvas.width = canvas.clientWidth;
canvas.height = canvas.clientHeight;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* grid */
ctx.strokeStyle="rgba(255,255,255,0.1)";
for(let i=0;i<canvas.width;i+=50){
  ctx.beginPath();
  ctx.moveTo(i,0);
  ctx.lineTo(i,canvas.height);
  ctx.stroke();
}
for(let i=0;i<canvas.height;i+=50){
  ctx.beginPath();
  ctx.moveTo(0,i);
  ctx.lineTo(canvas.width,i);
  ctx.stroke();
}

/* axes */
ctx.strokeStyle="rgba(255,255,255,0.3)";
ctx.beginPath();
ctx.moveTo(0,canvas.height/2);
ctx.lineTo(canvas.width,canvas.height/2);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(canvas.width/2,0);
ctx.lineTo(canvas.width/2,canvas.height);
ctx.stroke();

/* plot */
ctx.beginPath();
ctx.strokeStyle="#ffd8a6";

for(let px=0;px<canvas.width;px++){

let x = (px/canvas.width)*20 - 10;
let y;

try{
y = eval(expr.replace(/x/g,`(${x})`));
}catch{
continue;
}

let py = canvas.height/2 - y*20;

if(px===0) ctx.moveTo(px,py);
else ctx.lineTo(px,py);

}

ctx.stroke();

}

</script>

<!-- ============================
   3D SANDBOX
============================ -->

<script>

const container = document.getElementById("sandbox3d");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
container.clientWidth/container.clientHeight,
0.1,
1000
);

camera.position.set(0,30,100);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);

/* ---------------- FIELD SYSTEM ---------------- */

let field = {
fx:(x,y,z)=> -y,
fy:(x,y,z)=> x,
fz:(x,y,z)=> 0
};

let fieldStrength = 1;

document.getElementById("strength").oninput = e=>{
fieldStrength = parseFloat(e.target.value);
};

function updateField(){

try{

field.fx = new Function("x","y","z",
"return " + (document.getElementById("fx").value || "-y"));

field.fy = new Function("x","y","z",
"return " + (document.getElementById("fy").value || "x"));

field.fz = new Function("x","y","z",
"return " + (document.getElementById("fz").value || "0"));

generateField(); // regenerate arrows

}catch{
alert("Invalid field equations");
}

}

/* ---------------- VECTOR FIELD (ARROWS) ---------------- */

let arrows = [];

function generateField(){

arrows.forEach(a => scene.remove(a));
arrows = [];

const step = 12;

for(let x=-40;x<=40;x+=step){
for(let y=-40;y<=40;y+=step){
for(let z=-40;z<=40;z+=step){

let fx = field.fx(x,y,z);
let fy = field.fy(x,y,z);
let fz = field.fz(x,y,z);

let dir = new THREE.Vector3(fx,fy,fz);

if(dir.length() < 0.01) continue;

dir.normalize();

let arrow = new THREE.ArrowHelper(
dir,
new THREE.Vector3(x,y,z),
4,
0x66ccff
);

scene.add(arrow);
arrows.push(arrow);

}}}

}

/* ---------------- PARTICLES ---------------- */

let particles = [];

function spawn(){

let geo = new THREE.SphereGeometry(0.6,8,8);
let mat = new THREE.MeshBasicMaterial({color:0xffcc66});

let p = new THREE.Mesh(geo,mat);

p.position.set(0,0,0);

p.velocity = new THREE.Vector3(
(Math.random()-0.5)*2,
(Math.random()-0.5)*2,
(Math.random()-0.5)*2
);

/* ---- TRAIL ---- */

p.trail = [];
p.trailLine = new THREE.Line(
new THREE.BufferGeometry(),
new THREE.LineBasicMaterial({color:0xffaa66})
);

scene.add(p.trailLine);

/* ---- ADD ---- */

scene.add(p);
particles.push(p);

}

/* ---------------- ANIMATION ---------------- */

function animate(){

particles.forEach(p=>{

let force = new THREE.Vector3(
field.fx(p.position.x,p.position.y,p.position.z),
field.fy(p.position.x,p.position.y,p.position.z),
field.fz(p.position.x,p.position.y,p.position.z)
).multiplyScalar(0.01 * fieldStrength);

/* physics */
p.velocity.add(force);
p.velocity.multiplyScalar(0.995); // damping
p.position.add(p.velocity);

/* ---- TRAIL UPDATE ---- */

p.trail.push(p.position.clone());

if(p.trail.length > 80) p.trail.shift();

p.trailLine.geometry.setFromPoints(p.trail);

});

/* render */

controls.update();
renderer.render(scene,camera);
requestAnimationFrame(animate);

}

/* ---------------- START ---------------- */

generateField();
setInterval(spawn,700);
animate();

</script>
